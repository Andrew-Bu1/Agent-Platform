spring.config.import=optional:file:.env[.properties]

spring.application.name=access-service

# Datasource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:access_service}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=${SERVER_PORT:8005}

# JWT
app.jwt.secret=${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars!!}
app.jwt.access-token-expiry-seconds=${JWT_ACCESS_EXPIRY_SECONDS:900}
app.jwt.refresh-token-expiry-days=${JWT_REFRESH_EXPIRY_DAYS:30}

# Logging
logging.level.com.agentplatform.access=INFO
logging.level.org.springframework.security=WARN

# Springdoc / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
