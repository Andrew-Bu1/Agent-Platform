spring.config.import=optional:file:.env[.properties]
spring.application.name=iam-service

# ── Datasource ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:iam}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public

# ── Flyway ─────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ── Server ─────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── Actuator ───────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info

# ── JWT ────────────────────────────────────────────────────────────
app.jwt.key-encryption-secret=${APP_JWT_KEY_ENCRYPTION_SECRET}
app.jwt.issuer=iam-service
app.jwt.access-token-ttl-seconds=${JWT_ACCESS_TTL:3600}
app.jwt.refresh-token-ttl-seconds=${JWT_REFRESH_TTL:604800}
