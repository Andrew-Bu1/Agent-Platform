spring.config.import=optional:file:.env[.properties]
spring.application.name=agent-studio

# ── Datasource ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:agent_studio}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public

# ── Flyway ─────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ── Server ─────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8082}

# ── Actuator ───────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info

# ── Downstream services ────────────────────────────────────────────
# IAM URL is used to fetch the JWKS public key at startup
app.iam.url=${IAM_URL:http://localhost:8080}
app.aihub.url=${AIHUB_URL:http://localhost:8083}
app.datahub.url=${DATAHUB_URL:http://localhost:8084}
app.orchestrator.url=${ORCHESTRATOR_URL:http://localhost:8085}

# ── CORS ──────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# ── Async / SSE ────────────────────────────────────────────────────
spring.mvc.async.request-timeout=-1
