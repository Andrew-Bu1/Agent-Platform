version: '3.9'

services:
  minio:
    image: minio/minio:latest
    container_name: agent-platform-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data

  postgres:
    image: pgvector/pgvector:pg17
    container_name: agent-platform-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_studio
    ports:
      - "127.0.0.1:5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agent-platform-redis
    volumes:
      - redis_data:/data
      - ../../migrations/redis/users.acl:/usr/local/etc/redis/users.acl
    ports:
      - "127.0.0.1:6379:6379"
    command:
      redis-server --aclfile /usr/local/etc/redis/users.acl --appendonly yes

  aihub:
    build:
      context: ../..
      dockerfile: services/aihub/Dockerfile
    container_name: agent-platform-aihub
    env_file:
      - ../../services/aihub/.env
    volumes:
      - model_cache:/app/services/aihub/.models
    depends_on:
      - postgres
    ports:
      - "127.0.0.1:8000:8000"
  datahub:
    build:
      context: ../..   
      dockerfile: services/datahub/Dockerfile
    container_name: agent-platform-datahub
    env_file:
      - ../../services/datahub/.env
    depends_on:
      - postgres
      - minio
      - redis
    ports:
      - "127.0.0.1:8001:8001"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  model_cache: