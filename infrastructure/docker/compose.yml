x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg17
    container_name: agent-platform-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../migrations/postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: agent-platform-redis
    # Note: Redis usually uses an ACL file, but we can load general envs here too
    command: redis-server --aclfile /usr/local/etc/redis/users.acl --appendonly yes
    volumes:
      - redis_data:/data
      - ../../migrations/redis/users.acl:/usr/local/etc/redis/users.acl
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: *default-logging

  minio:
    image: minio/minio:latest
    container_name: agent-platform-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Application services ────────────────────────────────────────────────────

  iam-service:
    build:
      context: ../..
      dockerfile: services/iam-service/Dockerfile
    container_name: agent-platform-iam
    env_file:
      - ../../services/iam-service/.env
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped
    logging: *default-logging

  aihub:
    build:
      context: ../..
      dockerfile: services/aihub/Dockerfile
    container_name: agent-platform-aihub
    env_file:
      - ../../services/aihub/.env
    volumes:
      - model_cache:/app/services/aihub/.models
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      iam-service:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  datahub:
    build:
      context: ../..
      dockerfile: services/datahub/Dockerfile
    container_name: agent-platform-datahub
    env_file:
      - ../../services/datahub/.env
    ports:
      - "127.0.0.1:8084:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      iam-service:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  data-worker:
    build:
      context: ../..
      dockerfile: services/data-worker/Dockerfile
    container_name: agent-platform-data-worker
    env_file:
      - ../../services/data-worker/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      aihub:
        condition: service_started
      iam-service:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  agent-studio:
    build:
      context: ../..
      dockerfile: services/agent-studio/Dockerfile
    container_name: agent-platform-agent-studio
    env_file:
      - ../../services/agent-studio/.env
    ports:
      - "127.0.0.1:8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      iam-service:
        condition: service_healthy
      aihub:
        condition: service_started
      datahub:
        condition: service_started
      agent-orchestrator:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging

  agent-orchestrator:
    build:
      context: ../..
      dockerfile: services/agent-orchestrator/Dockerfile
    container_name: agent-platform-agent-orchestrator
    env_file:
      - ../../services/agent-orchestrator/.env
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      iam-service:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  agent-worker:
    build:
      context: ../..
      dockerfile: services/agent-worker/Dockerfile
    container_name: agent-platform-agent-worker
    env_file:
      - ../../services/agent-worker/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent-orchestrator:
        condition: service_started
      aihub:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging

